name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve project directory
        id: paths
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "workdir=." >> "$GITHUB_OUTPUT"
          elif [ -f packages/superpower-agent/package.json ]; then
            echo "workdir=packages/superpower-agent" >> "$GITHUB_OUTPUT"
          else
            echo "Unable to locate package.json for superpower-agent"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install
        working-directory: ${{ steps.paths.outputs.workdir }}

      - name: Run checks
        run: npm run check
        working-directory: ${{ steps.paths.outputs.workdir }}

      - name: Validate npm pack
        run: npm pack --dry-run
        working-directory: ${{ steps.paths.outputs.workdir }}
